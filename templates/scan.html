{% extends "base.html" %}

{% block title %}
QR Scanner
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="glass p-5 text-center">

        <h1 class="mb-4">
            🔍 QR Code Scanner
        </h1>

        <p class="mb-4">
            Upload any QR Code image and decode its content instantly.
        </p>

        <form method="POST" enctype="multipart/form-data">

            <input
                type="file"
                name="qr_file"
                class="form-control mb-3"
                accept="image/*"
                required
            >

            <button
                type="submit"
                class="btn btn-success btn-lg w-100"
            >
                Scan QR Code
            </button>

        </form>

        {% if result %}

        <div class="alert alert-info mt-4">

            <h4>
                Decoded Result
            </h4>

            <hr>

            <p class="mb-0">
                {{ result }}
            </p>

        </div>

        {% endif %}

    </div>

</div>

{% endblock %}
