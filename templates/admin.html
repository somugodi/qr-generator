{% extends "base.html" %}

{% block title %}
Admin Panel
{% endblock %}

{% block content %}

<div class="container">

    <div class="glass text-center">

        <h1 class="glow">
            Admin Panel
        </h1>

        <p>
            System Overview
        </p>

    </div>

    <div class="row mt-4">

        <div class="col-md-6">

            <div class="glass text-center">

                <h2>{{ total_users }}</h2>
                <h4>Total Users</h4>

            </div>

        </div>

        <div class="col-md-6">

            <div class="glass text-center">

                <h2>{{ total_qrs }}</h2>
                <h4>Total QR Codes</h4>

            </div>

        </div>

    </div>

    <div class="glass mt-4">

        <h3>Latest Users</h3>

        <table class="table table-dark table-hover">

            <thead>
                <tr>
                    <th>Username</th>
                </tr>
            </thead>

            <tbody>

                {% for user in latest_users %}

                <tr>
                    <td>{{ user[0] }}</td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
