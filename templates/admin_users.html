{% extends "base.html" %}

{% block title %}
Manage Users
{% endblock %}

{% block content %}

<div class="container">

    <div class="glass">

        <h1 class="glow text-center">
            Manage Users
        </h1>

        <table class="table table-dark table-hover mt-4">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                </tr>
            </thead>

            <tbody>

                {% for user in users %}

                <tr>

                    <td>{{ user[0] }}</td>
                    <td>{{ user[1] }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
