{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="glass">

<h2 class="text-center mb-4">
Create Account
</h2>

<form method="POST">

<input
type="text"
name="username"
class="form-control mb-3"
placeholder="Username"
required>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button
class="btn btn-success w-100">
Register
</button>

</form>

<br>

<p class="text-center">

Already registered?

<a href="/login" class="text-warning">
Login
</a>

</p>

</div>

</div>

</div>

{% endblock %}
